<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">Waveform-style screenshot</title>
  <desc id="desc">Stylized waveform showing pipeline events for branch, stall, and writeback.</desc>
  <rect width="1280" height="520" fill="#0b1014"/>
  <text x="58" y="66" fill="#f4f7f9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="800">Waveform Targets</text>
  <text x="58" y="104" fill="#9fb0bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Signals to inspect when a proof fails or a cover trace is generated.</text>
  <rect x="58" y="146" width="1164" height="306" rx="14" fill="#111a22" stroke="#25323d"/>
  <g stroke="#25323d" stroke-width="1">
    <line x1="260" y1="146" x2="260" y2="452"/>
    <line x1="400" y1="146" x2="400" y2="452"/>
    <line x1="540" y1="146" x2="540" y2="452"/>
    <line x1="680" y1="146" x2="680" y2="452"/>
    <line x1="820" y1="146" x2="820" y2="452"/>
    <line x1="960" y1="146" x2="960" y2="452"/>
    <line x1="1100" y1="146" x2="1100" y2="452"/>
  </g>
  <g font-family="Consolas, monospace" font-size="18">
    <text x="82" y="198" fill="#cbd5df">pc_q</text>
    <text x="82" y="248" fill="#cbd5df">load_use_stall</text>
    <text x="82" y="298" fill="#cbd5df">forward_a/b</text>
    <text x="82" y="348" fill="#cbd5df">ex_branch_taken</text>
    <text x="82" y="398" fill="#cbd5df">wb_valid_o</text>
  </g>
  <g fill="none" stroke-width="4">
    <path d="M260 194 H350 V176 H440 V194 H530 V176 H620 V194 H710 V176 H800 V194 H890 V176 H980 V194 H1100" stroke="#76b900"/>
    <path d="M260 244 H500 V226 H620 V244 H1100" stroke="#ffcc66"/>
    <path d="M260 294 H420 V276 H580 V294 H740 V276 H900 V294 H1100" stroke="#66c2ff"/>
    <path d="M260 344 H760 V326 H860 V344 H1100" stroke="#ff8f8f"/>
    <path d="M260 394 H610 V376 H690 V394 H890 V376 H970 V394 H1100" stroke="#cfe8b0"/>
  </g>
  <text x="74" y="486" fill="#9fb0bf" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Actual VCD output is generated by make sim or by failing/covering SymbiYosys runs.</text>
</svg>
